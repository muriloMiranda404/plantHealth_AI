name: plant_health
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  nt4: ^1.3.3
  fl_chart: ^0.70.2
  font_awesome_flutter: ^10.6.0
  provider: ^6.1.1
  shared_preferences: ^2.5.2
  flutter_mjpeg: ^2.0.3
  csv: ^6.0.0
  flutter_local_notifications: ^18.0.1
  path_provider: ^2.1.5
  share_plus: ^10.1.4
  mqtt_client: ^10.7.1
  cupertino_icons: ^1.0.8
  sqflite: ^2.4.2
  sqflite_common_ffi: ^2.3.4
  path: ^1.9.1
  web_socket_channel: ^2.4.0
  nsd: ^5.0.1
  speech_to_text: ^7.0.0
  flutter_tts: ^4.2.2
  image_picker: ^1.0.7
  http: ^0.13.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: ^0.13.1
  flutter_lints: ^6.0.0

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/logo.png"
  min_sdk_android: 21
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/logo.png"

flutter:
  uses-material-design: true
  assets:
    - assets/logo.png
